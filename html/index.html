<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Slothy Baseball</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main id="baseball-ui" aria-hidden="true">
            <section class="session-heading" aria-label="Batting practice status">
                <span class="eyebrow">Batting practice</span>
                <strong id="location-label">Grove Street Ballfield</strong>
                <span id="handedness-label">Right-handed batter</span>
                <span id="pitch-label">Press Space for pitch</span>
            </section>

            <section id="strike-zone" aria-label="Strike zone">
                <div class="zone-frame" aria-hidden="true">
                    <div class="grid">
                        <i></i><i></i><i></i><i></i>
                    </div>
                </div>

                <div id="pci" aria-label="Plate coverage indicator">
                    <span class="pci-outer-ring"></span>
                    <span class="pci-inner-bracket bracket-left"></span>
                    <span class="pci-inner-bracket bracket-right"></span>
                    <span class="pci-tick tick-top"></span>
                    <span class="pci-tick tick-right"></span>
                    <span class="pci-tick tick-bottom"></span>
                    <span class="pci-tick tick-left"></span>
                    <span class="pci-center">
                        <i></i><i></i><i></i>
                    </span>
                </div>

                <div id="pitch-ball" aria-label="Incoming baseball"></div>
            </section>

            <aside id="debug-overlay" aria-label="Baseball debug information"></aside>

            <section id="result-panel" aria-live="polite">
                <span class="result-eyebrow">Swing result</span>
                <strong id="result-headline">CONTACT</strong>
                <span id="result-name">BALL IN PLAY</span>
                <div id="result-stats"></div>
            </section>

            <section class="controls" aria-label="Controls">
                <span><kbd>Mouse</kbd> Move PCI</span>
                <span><kbd>Left Click</kbd> Swing</span>
                <span><kbd>Space</kbd> Request pitch</span>
                <span><kbd>C</kbd> Ball Cam: <b id="ball-camera-state">ON</b></span>
                <span><kbd>Backspace</kbd> Exit</span>
            </section>
        </main>

        <script src="app.js"></script>
    </body>
</html>
